# OpenClaw Light — Docker Compose build targets
#
# Usage:
#   docker compose -f docker-compose.build.yml build             # all targets
#   docker compose -f docker-compose.build.yml build aarch64     # ARM64 only

services:
  aarch64:
    build:
      context: .
      args:
        MUSL_TARGET: aarch64-musl
    image: openclaw-light:aarch64

  armv7:
    build:
      context: .
      args:
        MUSL_TARGET: armv7-musleabihf
    image: openclaw-light:armv7

  x86_64:
    build:
      context: .
      args:
        MUSL_TARGET: x86_64-musl
    image: openclaw-light:x86_64
