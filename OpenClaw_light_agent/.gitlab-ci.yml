# OpenClaw Light CI — GitCode (GitLab)
#
# Pipeline: test → build (on master only)
# Uses the multi-stage Dockerfile: builder → tester → runtime image

stages:
  - test
  - build

variables:
  DOCKER_BUILDKIT: "1"
  MUSL_TARGET: x86_64-musl

# ---------------------------------------------------------------------------
# Stage 1: Compile + run all tests (every push / MR)
# ---------------------------------------------------------------------------
test:
  stage: test
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: /certs
  script:
    - docker build
        --target tester
        --build-arg MUSL_TARGET=$MUSL_TARGET
        -t openclaw:test .
  tags:
    - docker

# ---------------------------------------------------------------------------
# Stage 2: Build runtime image (master only)
# ---------------------------------------------------------------------------
build:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: /certs
  script:
    - docker build
        --build-arg MUSL_TARGET=$MUSL_TARGET
        -t openclaw-light:latest .
    - docker image ls openclaw-light:latest
  only:
    - master
  tags:
    - docker
