<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenClaw Light</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f7f8;--fg:#1a1a2e;--bubble-user:#007aff;--bubble-user-fg:#fff;
  --bubble-ai:#e9e9eb;--bubble-ai-fg:#1a1a2e;--input-bg:#fff;--input-border:#d1d5db;
  --header-bg:#fff;--shadow:0 1px 3px rgba(0,0,0,.1);
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1a1a2e;--fg:#e0e0e0;--bubble-user:#0a84ff;--bubble-user-fg:#fff;
    --bubble-ai:#2a2a3e;--bubble-ai-fg:#e0e0e0;--input-bg:#2a2a3e;--input-border:#444;
    --header-bg:#16162a;--shadow:0 1px 3px rgba(0,0,0,.4);
  }
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--fg)}
#app{display:flex;flex-direction:column;height:100%;max-width:720px;margin:0 auto}
header{padding:12px 16px;background:var(--header-bg);box-shadow:var(--shadow);display:flex;align-items:center;gap:8px;z-index:10}
header h1{font-size:16px;font-weight:600;flex:1}
#status{font-size:11px;padding:2px 8px;border-radius:10px;background:#4caf50;color:#fff}
#status.error{background:#f44336}
#status.connecting{background:#ff9800}
#messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px}
.msg{max-width:80%;padding:10px 14px;border-radius:16px;line-height:1.5;font-size:14px;word-wrap:break-word;white-space:pre-wrap}
.msg.user{align-self:flex-end;background:var(--bubble-user);color:var(--bubble-user-fg);border-bottom-right-radius:4px}
.msg.ai{align-self:flex-start;background:var(--bubble-ai);color:var(--bubble-ai-fg);border-bottom-left-radius:4px}
.msg code{font-family:"SF Mono",Menlo,monospace;font-size:13px;background:rgba(0,0,0,.08);padding:1px 4px;border-radius:3px}
.msg pre{background:rgba(0,0,0,.1);padding:8px 10px;border-radius:6px;overflow-x:auto;margin:6px 0}
.msg pre code{background:none;padding:0}
.typing-indicator{align-self:flex-start;padding:10px 14px;border-radius:16px;background:var(--bubble-ai);display:none}
.typing-indicator span{display:inline-block;width:6px;height:6px;background:var(--fg);border-radius:50%;opacity:.4;margin:0 1px;animation:bounce .6s infinite}
.typing-indicator span:nth-child(2){animation-delay:.15s}
.typing-indicator span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
#input-area{padding:12px 16px;background:var(--header-bg);box-shadow:0 -1px 3px rgba(0,0,0,.1);display:flex;gap:8px;align-items:flex-end}
#input{flex:1;padding:10px 14px;border:1px solid var(--input-border);border-radius:20px;background:var(--input-bg);color:var(--fg);font-size:14px;font-family:inherit;resize:none;max-height:120px;outline:none;line-height:1.4}
#input:focus{border-color:var(--bubble-user)}
#send-btn{width:36px;height:36px;border-radius:50%;border:none;background:var(--bubble-user);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
#send-btn:disabled{opacity:.4;cursor:not-allowed}
#send-btn svg{width:18px;height:18px}
#auth-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:100}
#auth-box{background:var(--header-bg);padding:24px;border-radius:12px;box-shadow:var(--shadow);max-width:360px;width:90%}
#auth-box h2{font-size:16px;margin-bottom:12px}
#auth-box input{width:100%;padding:10px;border:1px solid var(--input-border);border-radius:8px;background:var(--input-bg);color:var(--fg);font-size:14px;margin-bottom:12px}
#auth-box button{width:100%;padding:10px;border-radius:8px;border:none;background:var(--bubble-user);color:#fff;font-size:14px;cursor:pointer}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>OpenClaw Light</h1>
    <span id="status">Ready</span>
  </header>
  <div id="messages">
    <div class="typing-indicator" id="typing"><span></span><span></span><span></span></div>
  </div>
  <div id="input-area">
    <textarea id="input" rows="1" placeholder="Type a message..." autofocus></textarea>
    <button id="send-btn" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg>
    </button>
  </div>
</div>
<div id="auth-overlay">
  <div id="auth-box">
    <h2>Authentication Required</h2>
    <input type="password" id="auth-input" placeholder="Enter access token">
    <button id="auth-btn">Connect</button>
  </div>
</div>
<script>
(function(){
  const $messages=document.getElementById('messages');
  const $input=document.getElementById('input');
  const $send=document.getElementById('send-btn');
  const $status=document.getElementById('status');
  const $typing=document.getElementById('typing');
  const $authOverlay=document.getElementById('auth-overlay');
  const $authInput=document.getElementById('auth-input');
  const $authBtn=document.getElementById('auth-btn');

  let chatId=localStorage.getItem('oc_chat_id');
  if(!chatId){chatId='web_'+Date.now().toString(36);localStorage.setItem('oc_chat_id',chatId)}
  let token=localStorage.getItem('oc_token')||'';
  let sending=false;

  function setStatus(text,cls){
    $status.textContent=text;
    $status.className=cls||'';
  }

  function autoResize(){
    $input.style.height='auto';
    $input.style.height=Math.min($input.scrollHeight,120)+'px';
  }

  function scrollToBottom(){
    $messages.scrollTop=$messages.scrollHeight;
  }

  function renderMarkdown(text){
    // Code blocks
    text=text.replace(/```(\w*)\n([\s\S]*?)```/g,function(_,lang,code){
      return '<pre><code>'+escHtml(code.replace(/\n$/,''))+'</code></pre>';
    });
    // Inline code
    text=text.replace(/`([^`]+)`/g,'<code>'+('$1')+'</code>');
    // Bold
    text=text.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
    return text;
  }

  function escHtml(s){
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function addMessage(role,text,raw){
    const div=document.createElement('div');
    div.className='msg '+(role==='user'?'user':'ai');
    if(role==='user'){
      div.textContent=text;
    }else{
      div.innerHTML=renderMarkdown(escHtml(text));
    }
    $messages.insertBefore(div,$typing);
    scrollToBottom();
    return div;
  }

  function headers(){
    const h={'Content-Type':'application/json'};
    if(token)h['Authorization']='Bearer '+token;
    return h;
  }

  async function loadHistory(){
    try{
      const resp=await fetch('/chat/history?chat_id='+encodeURIComponent(chatId),{headers:headers()});
      if(resp.status===401){showAuth();return}
      const entries=await resp.json();
      for(const e of entries){
        addMessage(e.role,e.text);
      }
    }catch(e){
      console.warn('Failed to load history:',e);
    }
  }

  async function sendMessage(){
    const text=$input.value.trim();
    if(!text||sending)return;
    sending=true;
    $send.disabled=true;
    $input.value='';
    autoResize();

    addMessage('user',text);
    $typing.style.display='block';
    setStatus('Thinking...','connecting');
    scrollToBottom();

    let aiDiv=null;
    let accumulated='';

    try{
      const resp=await fetch('/chat/stream',{
        method:'POST',
        headers:headers(),
        body:JSON.stringify({chat_id:chatId,text:text})
      });

      if(resp.status===401){
        $typing.style.display='none';
        setStatus('Unauthorized','error');
        showAuth();
        sending=false;
        $send.disabled=false;
        return;
      }

      const reader=resp.body.getReader();
      const decoder=new TextDecoder();
      let buffer='';

      while(true){
        const{done,value}=await reader.read();
        if(done)break;
        buffer+=decoder.decode(value,{stream:true});

        // Parse SSE lines
        const lines=buffer.split('\n');
        buffer=lines.pop()||'';

        for(const line of lines){
          if(!line.startsWith('data: '))continue;
          const json=line.slice(6);
          if(!json)continue;
          try{
            const evt=JSON.parse(json);
            if(evt.type==='delta'){
              if(!aiDiv){aiDiv=addMessage('assistant','')}
              accumulated+=evt.text;
              aiDiv.innerHTML=renderMarkdown(escHtml(accumulated));
              scrollToBottom();
              $typing.style.display='none';
            }else if(evt.type==='typing'){
              $typing.style.display='block';
              scrollToBottom();
            }else if(evt.type==='done'){
              $typing.style.display='none';
              if(evt.text&&evt.text.length>0){
                // Calibrate with full text
                accumulated=evt.text;
                if(!aiDiv){aiDiv=addMessage('assistant','')}
                aiDiv.innerHTML=renderMarkdown(escHtml(accumulated));
              }else if(!aiDiv&&accumulated.length===0){
                // No text was received at all
              }
              setStatus('Ready','');
            }else if(evt.type==='error'){
              $typing.style.display='none';
              if(!aiDiv){aiDiv=addMessage('assistant','Error: '+evt.message)}
              setStatus('Error','error');
            }
          }catch(e){
            console.warn('SSE parse error:',e);
          }
        }
      }
    }catch(e){
      $typing.style.display='none';
      console.error('Stream error:',e);
      setStatus('Connection lost','error');
      if(!aiDiv){addMessage('assistant','Connection error. Please try again.')}
    }

    $typing.style.display='none';
    if($status.textContent!=='Error')setStatus('Ready','');
    sending=false;
    $send.disabled=false;
    $input.focus();
  }

  function showAuth(){
    $authOverlay.style.display='flex';
    $authInput.focus();
  }

  function submitAuth(){
    token=$authInput.value.trim();
    if(!token)return;
    localStorage.setItem('oc_token',token);
    $authOverlay.style.display='none';
    $authInput.value='';
    loadHistory();
  }

  // Event listeners
  $input.addEventListener('input',function(){
    autoResize();
    $send.disabled=!$input.value.trim();
  });
  $input.addEventListener('keydown',function(e){
    if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}
  });
  $send.addEventListener('click',sendMessage);
  $authBtn.addEventListener('click',submitAuth);
  $authInput.addEventListener('keydown',function(e){
    if(e.key==='Enter')submitAuth();
  });

  // Init
  loadHistory();
})();
</script>
</body>
</html>
